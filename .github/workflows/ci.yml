name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Present so the generated JavaScript is checked with `node --check`
      # rather than the fallback bracket-balance heuristic.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the test suite
        run: python -m pytest

      - name: Smoke-test the CLI
        run: |
          python -m otelgen --list-targets
          python -m otelgen -l python -f fastapi -b tempo -s ci-check --dry-run
          python -m otelgen -l go -f grpc -b jaeger -s ci-check --out /tmp/ci-out
          test -s /tmp/ci-out/tracing/tracing.go
